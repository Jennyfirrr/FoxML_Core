    attributes:
      value: |
        ### License Notice

        This project is licensed under the MIT License.

        See the LICENSE file for full terms and conditions.

  - type: checkboxes
    attributes:
      label: Acknowledgment
      description: Confirm you understand the license.
      options:
        - label: I understand this software is licensed under the MIT License
        - label: I will comply with the MIT license terms



